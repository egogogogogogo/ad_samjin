<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generic PMS Boilerplate</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav class="sidebar">
        <div class="logo">GENERIC PMS</div>
        <ul class="nav-links">
            <li class="active" data-tab="dashboard">📊 Dashboard</li>
            <li data-tab="data">📋 Data Explorer</li>
            <li data-tab="settings">⚙️ Settings</li>
        </ul>
    </nav>

    <main class="main-content">
        <header>
            <h1 id="page-title">Executive Overview</h1>
            <button class="btn btn-primary" id="btn-refresh">Refresh Data</button>
        </header>

        <!-- Dashboard Tab -->
        <section id="tab-dashboard" class="tab-content active">
            <div class="kpi-grid">
                <div class="kpi-card">
                    <div class="label">Production Total</div>
                    <div id="kpi-total" class="value">-</div>
                </div>
                <div class="kpi-card">
                    <div class="label">Defect Rate (PPM)</div>
                    <div id="kpi-ppm" class="value" style="color:var(--accent)">-</div>
                </div>
                <div class="kpi-card">
                    <div class="label">Achieve Rate</div>
                    <div id="kpi-achieve" class="value">-</div>
                </div>
            </div>

            <div class="chart-grid">
                <div class="card">
                    <div class="card-title">Production Trend</div>
                    <div style="height: 300px;"><canvas id="mainChart"></canvas></div>
                </div>
                <div class="card">
                    <div class="card-title">Data Distribution</div>
                    <div style="height: 300px;"><canvas id="distChart"></canvas></div>
                </div>
            </div>
        </section>

        <!-- Data Explorer Tab -->
        <section id="tab-data" class="tab-content">
            <div class="card">
                <div class="card-title">Incoming Raw Data</div>
                <div class="table-wrap">
                    <table>
                        <thead id="table-head"></thead>
                        <tbody id="table-body"></tbody>
                    </table>
                </div>
            </div>
        </section>

        <!-- Settings Tab -->
        <section id="tab-settings" class="tab-content">
            <div class="card" style="max-width: 600px;">
                <div class="card-title">System Connect</div>
                <div style="display: flex; flex-direction: column; gap: 16px;">
                    <div>
                        <label style="font-size:12px; color:var(--text-dim); display:block; margin-bottom:8px;">Web App API URL</label>
                        <input type="text" id="api-url-input" style="width:100%; padding:10px; background:rgba(0,0,0,0.1); border:1px solid var(--border); color:#fff; border-radius:6px;">
                    </div>
                    <button class="btn btn-primary" id="btn-save-settings">Save Properties</button>
                </div>
                <div id="log-console" style="margin-top:24px; padding:12px; background:#000; font-family:monospace; font-size:11px; height:100px; overflow-y:auto; color:var(--success);">
                    Console initialized...
                </div>
            </div>
        </section>
    </main>

    <script src="main.js"></script>
</body>
</html>
