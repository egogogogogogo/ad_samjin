name: Deploy to Google Apps Script

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Create clasprc.json
        env:
          CLASPRC_JSON: ${{ secrets.CLASPRC_JSON }}
        run: echo "$CLASPRC_JSON" > ~/.clasprc.json

      - name: Create clasp.json
        env:
          SCRIPT_ID: ${{ secrets.CLASP_SCRIPT_ID }}
        run: echo "{\"scriptId\":\"$SCRIPT_ID\",\"rootDir\":\"./src/backend\"}" > .clasp.json

      - name: Push to Apps Script
        run: npx clasp push -f

      - name: Deploy to Web App
        id: deploy_apps_script
        run: |
          DEPLOY_OUTPUT=$(npx clasp deploy -d "Auto-deployed via GitHub Actions") || { echo "Clasp deploy failed"; exit 1; }
          echo "$DEPLOY_OUTPUT"
          
          # grep이 매칭 결과를 찾지 못해도 에러(1)를 내지 않도록 || true 추가
          URL=$(echo "$DEPLOY_OUTPUT" | grep -o "https://script.google.com/macros/s/[^ ]*/exec" | head -n 1 || true)
          
          if [ -z "$URL" ]; then
            echo "Warning: Web App URL not found in output. Falling back to secrets.API_URL"
            URL="${{ secrets.API_URL }}"
          fi
          
          echo "WEB_APP_URL=$URL" >> $GITHUB_ENV

      - name: Generate config.js
        run: |
          cat <<EOF > src/frontend/config.js
          const CONFIG = {
              apiUrl: '${{ env.WEB_APP_URL }}',
              thresholds: { ppm: 500, monthlyTarget: 4500000, defectLimit: 80, capMin: 410 }
          };
          EOF

      - name: Deploy Frontend to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./src/frontend
