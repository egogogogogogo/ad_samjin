name: Deploy to Google Apps Script

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  # Node 20 관련 경고를 방지하고 Node 24 런타임 사용을 허용
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Create clasprc.json
        env:
          CLASPRC_JSON: ${{ secrets.CLASPRC_JSON }}
        run: echo "$CLASPRC_JSON" > ~/.clasprc.json

      - name: Create clasp.json
        env:
          SCRIPT_ID: ${{ secrets.CLASP_SCRIPT_ID }}
        run: echo "{\"scriptId\":\"$SCRIPT_ID\",\"rootDir\":\"./src/backend\"}" > .clasp.json

      - name: Push to Apps Script
        run: npx clasp push -f

      - name: Deploy to Web App
        id: deploy_apps_script
        run: |
          echo "Starting clasp deployment..."
          # 캡처와 동시에 실시간 로그 출력을 위해 tee 사용
          DEPLOY_OUTPUT=$(npx clasp deploy -d "Auto-deployed via GitHub Actions" | tee /dev/stderr)
          
          # URL 추출 시도
          URL=$(echo "$DEPLOY_OUTPUT" | grep -o "https://script.google.com/macros/s/[^ ]*/exec" | head -n 1 || true)
          
          if [ -z "$URL" ]; then
            echo "::warning::Web App URL을 추출할 수 없습니다. 시크릿 설정값(API_URL)을 사용합니다."
            URL="${{ secrets.API_URL }}"
          fi
          
          if [ -z "$URL" ]; then
            echo "::error::API URL이 정의되지 않았습니다. 추출 실패 및 시크릿(API_URL)이 누락되었습니다."
            echo "WEB_APP_URL=https://api.placeholder.com" >> $GITHUB_ENV
          else
            echo "WEB_APP_URL=$URL" >> $GITHUB_ENV
            echo "SUCCESS: Web App URL is $URL"
          fi

      - name: Generate config.js
        run: |
          cat <<EOF > src/frontend/config.js
          /** Auto-generated by CI/CD */
          const CONFIG = {
              apiUrl: '${{ env.WEB_APP_URL }}',
              thresholds: { ppm: 500, monthlyTarget: 4500000, defectLimit: 80, capMin: 410 }
          };
          EOF

      - name: Deploy Frontend to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./src/frontend
