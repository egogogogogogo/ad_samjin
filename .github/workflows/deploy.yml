name: Deploy to Google Apps Script

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  # Node 20 관련 경고를 방지하고 Node 24 런타임 사용을 허용
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Create clasprc.json
        env:
          CLASPRC_JSON: ${{ secrets.CLASPRC_JSON }}
        run: echo "$CLASPRC_JSON" > ~/.clasprc.json

      - name: Initialize Clasp and Validate ID
        env:
          SCRIPT_ID: ${{ secrets.CLASP_SCRIPT_ID }}
        run: |
          if [ -z "$SCRIPT_ID" ]; then
            echo "::error::CLASP_SCRIPT_ID is missing in GitHub Secrets!"
            exit 1
          fi
          # Masked output for debugging
          echo "Validating Script ID (Masked): ${SCRIPT_ID:0:5}********************${SCRIPT_ID: -5}"
          
          # JSON 생성을 더 안전하게 수행
          printf '{"scriptId":"%s","rootDir":"./src/backend"}' "$SCRIPT_ID" > .clasp.json

      - name: Push to Apps Script
        run: npx clasp push -f

      - name: Deploy and Extract URL
        id: deploy_step
        run: |
          set -o pipefail
          echo "--- Clasp Status ---"
          npx clasp status || { echo "❌ Clasp status check failed. Check CLASP_SCRIPT_ID and CLASPRC_JSON."; exit 1; }
          
          echo "--- Executing Deployment ---"
          # 결과를 임시 파일에 저장하여 파싱 오류 방지
          npx clasp deploy -d "Auto-deployed via GitHub Actions" > deploy_log.txt 2>&1 || { cat deploy_log.txt; echo "❌ Clasp deploy failed."; exit 1; }
          cat deploy_log.txt
          
          # URL 추출
          URL=$(grep -o "https://script.google.com/macros/s/[^ ]*/exec" deploy_log.txt | head -n 1 || true)
          
          if [ -z "$URL" ]; then
            echo "::warning::Web App URL not found in logs. Checking fallback..."
            # 만약 목록에서 가져오기 시도
            echo "--- Checking Existing Deployments ---"
            npx clasp deployments > deployments.txt
            URL=$(grep -o "https://script.google.com/macros/s/[^ ]*/exec" deployments.txt | head -n 1 || true)
          fi
          
          if [ -z "$URL" ]; then
            echo "::notice::Automated URL extraction found no value. Using secret API_URL."
            URL="${{ secrets.API_URL }}"
          fi

          if [ -z "$URL" ]; then
             echo "❌ Error: API_URL extraction failed and no secret found."
             exit 1
          fi

          echo "Final WEB_APP_URL: $URL"
          echo "WEB_APP_URL=$URL" >> $GITHUB_ENV

      - name: Generate config.js
        run: |
          cat <<EOF > src/frontend/config.js
          /** Auto-generated by CI/CD at $(date) */
          const CONFIG = {
              apiUrl: '${{ env.WEB_APP_URL }}',
              thresholds: { ppm: 500, monthlyTarget: 4500000, defectLimit: 80, capMin: 410 }
          };
          EOF

      - name: Deploy Frontend to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./src/frontend
